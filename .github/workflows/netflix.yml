name: Netflix Household Auto-Confirm

on:
  schedule:
    - cron: '*/100000 * * * *'    # her ~100000 dakikada bir
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node 20 uyarısını giderir

jobs:
  confirm:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Çalıştır
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node index.js
      - name: Ekran görüntüsü (hata ayıklama)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ekran-goruntusu
          path: '*.png'
          if-no-files-found: ignore
          retention-days: 3
